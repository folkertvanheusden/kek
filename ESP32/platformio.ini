[platformio]
default_envs = seeed_xiao_s3
src_dir = .
lib_ignore = SHAdisplay

[env:ESP32-wemos]
build_src_filter = +<*> -<.git/> -<.svn/> -<example/> -<examples/> -<test/> -<tests/> -<build> -<player.cpp> -<SHAdisplay/> -<console_shabadge.cpp>
platform = espressif32
board = wemos_d1_mini32
framework = arduino
monitor_speed = 115200
upload_speed = 1000000
board_build.filesystem = littlefs
lib_deps = greiman/SdFat@^2.1.2
	adafruit/Adafruit NeoPixel
	bblanchon/ArduinoJson@^7.0.4
	td-er/SC16IS752@^1.0.2
build_flags = -std=gnu++2a -DESP32=1 -ggdb3 -D_GLIBCXX_USE_C99 -fexceptions -DTTY_SERIAL_TX=17 -DTTY_SERIAL_RX=18 -DRGBW_PIXELS -DNEOPIXELS_PIN=25
extra_scripts = pre:prepare.py
board_build.arduino.partitions = partitions-4MB.csv

[env:seeed_xiao_s3]
#platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
platform = espressif32
board = seeed_xiao_esp32s3
build_src_filter = +<*> -<.git/> -<.svn/> -<example/> -<examples/> -<test/> -<tests/> -<build> -<player.cpp> -<SHAdisplay/> -<console_shabadge.cpp>
framework = arduino
monitor_speed = 115200
upload_speed = 1000000
board_build.filesystem = littlefs
lib_deps = greiman/SdFat@^2.1.2
        adafruit/Adafruit NeoPixel
        bblanchon/ArduinoJson@^7.0.4
	td-er/SC16IS752@^1.0.2
build_flags = -DESP32=1 -ggdb3 -D_GLIBCXX_USE_C99 -DBOARD_HAS_PSRAM -mfix-esp32-psram-cache-issue -DCONFIG_SPIRAM_USE_MALLOC -DTTY_SERIAL_TX=43 -DTTY_SERIAL_RX=44 -DNEOPIXELS_PIN=2 -fexceptions -DSEEED_XIAO_S3=1 -Ofast
extra_scripts = pre:prepare.py

[env:lolin_s2_mini]
platform = espressif32
board = lolin_s2_mini
build_src_filter = +<*> -<.git/> -<.svn/> -<example/> -<examples/> -<test/> -<tests/> -<build> -<player.cpp> -<SHAdisplay/> -<console_shabadge.cpp>
framework = arduino
monitor_speed = 115200
upload_speed = 1000000
board_build.filesystem = littlefs
lib_deps = greiman/SdFat@^2.1.2
        adafruit/Adafruit NeoPixel
        bblanchon/ArduinoJson@^7.0.4
	td-er/SC16IS752@^1.0.2
build_flags = -DESP32=1 -ggdb3 -D_GLIBCXX_USE_C99 -DBOARD_HAS_PSRAM -mfix-esp32-psram-cache-issue -DCONFIG_SPIRAM_USE_MALLOC -DTTY_SERIAL_TX=17 -DTTY_SERIAL_RX=18 -DNEOPIXELS_PIN=40 -fexceptions
extra_scripts = pre:prepare.py
board_build.arduino.partitions = partitions-4MB.csv
# SD    ESP
# CS:   12
# MOSI: 11
# MISO:  9
# SCK:   7
