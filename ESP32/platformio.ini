[platformio]
default_envs = seeed_xiao_s3
src_dir = .

[env:ESP32-wemos]
build_src_filter = +<*> -<.git/> -<.svn/> -<example/> -<examples/> -<test/> -<tests/> -<build> -<player.cpp> -<console_shabadge.cpp>
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = wemos_d1_mini32
framework = arduino
monitor_speed = 115200
upload_speed = 1000000
board_build.filesystem = littlefs
lib_deps = greiman/SdFat
	adafruit/Adafruit NeoPixel
	bblanchon/ArduinoJson@^7.0.4
	td-er/SC16IS752@^1.0.2
build_flags = -std=gnu++2a -DESP32=1 -ggdb3 -D_GLIBCXX_USE_C99 -fexceptions -DTTY_SERIAL_TX=17 -DTTY_SERIAL_RX=18 -DRGBW_PIXELS -DNEOPIXELS_PIN=25
extra_scripts = pre:prepare.py
board_build.arduino.partitions = partitions-4MB.csv

[env:seeed_xiao_s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = seeed_xiao_esp32s3
build_src_filter = +<*> -<.git/> -<.svn/> -<example/> -<examples/> -<test/> -<tests/> -<build> -<player.cpp> -<console_shabadge.cpp>
framework = arduino
monitor_speed = 115200
upload_speed = 1000000
board_build.filesystem = littlefs
lib_deps = greiman/SdFat
        adafruit/Adafruit NeoPixel
        bblanchon/ArduinoJson@^7.0.4
	td-er/SC16IS752@^1.0.2
build_flags = -DESP32=1 -ggdb3 -D_GLIBCXX_USE_C99 -DBOARD_HAS_PSRAM -mfix-esp32-psram-cache-issue -DCONFIG_SPIRAM_USE_MALLOC -DTTY_SERIAL_TX=43 -DTTY_SERIAL_RX=44 -DNEOPIXELS_PIN=2 -fexceptions -DSEEED_XIAO_S3=1 -Ofast -std=gnu++2a
build_unflags = -std=gnu++11
extra_scripts = pre:prepare.py

[env:lolin_s2_mini]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = lolin_s2_mini
build_src_filter = +<*> -<.git/> -<.svn/> -<example/> -<examples/> -<test/> -<tests/> -<build> -<player.cpp> -<SHAdisplay/> -<console_shabadge.cpp>
framework = arduino
monitor_speed = 115200
upload_speed = 1000000
board_build.filesystem = littlefs
lib_deps = greiman/SdFat
        adafruit/Adafruit NeoPixel
        bblanchon/ArduinoJson@^7.0.4
	td-er/SC16IS752@^1.0.2
build_flags = -DESP32=1 -ggdb3 -D_GLIBCXX_USE_C99 -DBOARD_HAS_PSRAM -mfix-esp32-psram-cache-issue -DCONFIG_SPIRAM_USE_MALLOC -DTTY_SERIAL_TX=17 -DTTY_SERIAL_RX=18 -DNEOPIXELS_PIN=40 -fexceptions
extra_scripts = pre:prepare.py
board_build.arduino.partitions = partitions-4MB.csv
# SD    ESP
# CS:   12
# MOSI: 11
# MISO:  9
# SCK:   7

[env:waveshare_s3_eth]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv
board_build.extra_flags = -DBOARD_HAS_PSRAM -DARDUINO_USB_CDC_ON_BOOT=1
build_src_filter = +<*> -<.git/> -<.svn/> -<example/> -<examples/> -<test/> -<tests/> -<build> -<player.cpp> -<console_shabadge.cpp>
framework = arduino
monitor_speed = 115200
upload_speed = 1000000
board_build.filesystem = littlefs
lib_deps = greiman/SdFat
        adafruit/Adafruit NeoPixel
        bblanchon/ArduinoJson@^7.0.4
	td-er/SC16IS752@^1.0.2
build_flags = -DESP32=1 -ggdb3 -D_GLIBCXX_USE_C99 -DBOARD_HAS_PSRAM -mfix-esp32-psram-cache-issue -DCONFIG_SPIRAM_USE_MALLOC -fexceptions -DWAVESHARE_S3_ETH=1 -Ofast -std=gnu++2a
build_unflags = -std=gnu++11
extra_scripts = pre:prepare.py
