name: macos

on:
  push:
    branches:
      - macosx_fixes
  schedule:
    - cron: "50 8 * * 1"

jobs:
  build:

    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: init
      run: |
        git submodule init
        git submodule update
        brew install ncurses jansson
    - name: cmake
      run: LDFLAGS="-L/opt/homebrew/opt/ncurses/lib" CPPFLAGS="-I/opt/homebrew/opt/ncurses/include" PKG_CONFIG_PATH="/opt/homebrew/opt/ncurses/lib/pkgconfig" cmake -S . -B build
    - name: make
      run: make -C build kek
    - name: store artifact in GitHub
      uses: actions/upload-artifact@v4
      with:
        name: my-artifact
        path: build/kek
        retention-days: 7
